<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="./img/favicon.svg" />
    <link rel="stylesheet" href="./style/main.css" />
    <title>Последний Приют</title>
    <style></style>
  </head>
  <body>
    <div class="background-wrapper"></div>
    <div class="body">
      <div class="container">
        <!--Image-->
        <div class="album-image">
          <img
            src="./img/banner.png"
            alt="album-cover"
            class="album-cover"
          />
        </div>
        <!--List-->
        <div class="platform-list">  
          
          <!--Telegram-->
          <div class="platform-list-item">
            <div class="platform-info">
              <div class="platform-icon">
                <img
                  src="./img/telegram.svg"
                  alt="vk"
                  class="platform-icon"
                />
              </div>
              <span class="platform-name">Telegram</span>
            </div>
            <div class="listen-btn">
              <a
                href="https://t.me/SirioCo"
                class="link"
                target="_blank"
                >Перейти</a
              >
            </div>
          </div>               
          
          <!--VK-->
          <div class="platform-list-item">
            <div class="platform-info">
              <div class="platform-icon">
                <img
                  src="./img/vk.svg"
                  alt="vk"
                  class="platform-icon"
                />
              </div>
              <span class="platform-name">ВКонтакте</span>
            </div>
            <div class="listen-btn">
              <a
                href="https://vk.com/clublasthome"
                class="link"
                target="_blank"
                >Перейти</a
              >
            </div>
          </div>
          

        
        
      </div>
    </div>
  </body>
</html>
